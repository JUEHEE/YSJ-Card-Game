<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGE (24) : YSJ World Cup</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-pink: #f1c6d3;
            --dark-pink: #e4a1b5;
            --text-black: #333;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Gaegu', cursive; background-color: var(--main-pink);
            overflow: hidden; color: var(--text-black);
        }

        /* 인트로: 문 열기 애니메이션 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; justify-content: center; align-items: center;
        }

        .door {
            position: absolute; width: 50%; height: 100%;
            background-color: var(--main-pink);
            border: 2px solid white; transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .door-left { left: 0; transform-origin: left; border-right: none; }
        .door-right { right: 0; transform-origin: right; border-left: none; }

        .door.open-left { transform: rotateY(-110deg); }
        .door.open-right { transform: rotateY(110deg); }

        /* 문 위의 디자인 (보내주신 이미지 느낌) */
        .door-design { text-align: center; pointer-events: none; }
        .hbd-circle {
            display: inline-block; width: 40px; height: 50px; border-radius: 50%;
            background: white; border: 1px solid #ccc; line-height: 50px;
            font-size: 1.5rem; margin: 5px; font-weight: bold;
        }

        /* 스타트 버튼 */
        #start-btn {
            position: absolute; z-index: 110;
            padding: 15px 40px; font-size: 2rem; font-family: 'Gaegu';
            background: white; border: 3px solid var(--dark-pink);
            border-radius: 50px; cursor: pointer; color: var(--dark-pink);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: 0.3s;
        }
        #start-btn:hover { transform: scale(1.1); background: var(--dark-pink); color: white; }

        /* 게임 컨테이너 */
        #game-container {
            display: none; flex-direction: column; align-items: center;
            width: 100%; height: 100%; padding-top: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 3rem; margin: 0; color: white; text-shadow: 2px 2px var(--dark-pink); }

        .match-box {
            display: flex; align-items: center; justify-content: center;
            gap: 20px; width: 90%; max-width: 900px;
        }

        .card {
            flex: 1; background: white; border-radius: 20px; overflow: hidden;
            cursor: pointer; transition: 0.3s; border: 5px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--dark-pink); }
        .img-box { width: 100%; height: 350px; background: #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        .name-tag { padding: 15px; text-align: center; font-size: 1.4rem; font-weight: bold; }

        .vs { font-size: 3rem; font-weight: 900; color: white; text-shadow: 3px 3px var(--dark-pink); }

        /* 결과 화면 */
        #result-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; text-align: center;
        }
        #winner-slot { margin: 20px 0; }
        .final-btn {
            padding: 10px 25px; font-size: 1.5rem; margin: 10px;
            border-radius: 30px; border: none; cursor: pointer; font-family: 'Gaegu';
        }
        .cert-btn { background: #34ace0; color: white; }
        .retry-btn { background: var(--dark-pink); color: white; }

        /* 빵빠레 효과용 전광판 */
        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button id="start-btn" onclick="openDoor()">START!</button>
        <div class="door door-left" id="d-left">
            <div class="door-design">
                <div class="hbd-circle">H</div><div class="hbd-circle">B</div><div class="hbd-circle">D</div>
                <p>MY DEAR SOOBIE</p>
            </div>
        </div>
        <div class="door door-right" id="d-right">
            <div class="door-design">
                <div class="hbd-circle">Y</div><div class="hbd-circle">S</div><div class="hbd-circle">J</div>
                <p>PAGE (24)</p>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="header">
            <h1 id="round-title">10강</h1>
            <p id="match-info" style="font-size: 1.5rem;">1 / 5</p>
        </div>
        <div class="match-box">
            <div class="card" onclick="select(0)">
                <div class="img-box"><img id="img-l" src=""></div>
                <div class="name-tag" id="name-l">후보 A</div>
            </div>
            <div class="vs">VS</div>
            <div class="card" onclick="select(1)">
                <div class="img-box"><img id="img-r" src=""></div>
                <div class="name-tag" id="name-r">후보 B</div>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <h1>💖 양준이를 대체할 사람은 오로지 새로운 양성준💖</h1>
        <div id="winner-slot"></div>
        <button class="final-btn cert-btn" onclick="sendEmail()">양준이한테 인증샷 보내기</button>
        <button class="final-btn retry-btn" onclick="location.reload()">다시 하기</button>
    </div>

    <canvas id="confetti"></canvas>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        let items = [
            { name: "후궁, 누구를 들이시겠습니까", src: "yj_0.jpg" },
            { name: "오빠랑 잠깐 나가서 메로나 먹고 올래? ㅋㅋ", src: "yj_1.jpg" },
            { name: "누나 위해서 별 따주려고 나 지금 행성 가고 있어.", src: "yj_2.jpg" },
            { name: "발 되게 작다 ㅋㅋ; 나랑 발 크기 재볼래?", src: "yj_3.jpg" },
            { name: "아 잠만, 돈을 니가 왜 벌어 ㅋㅋ 오빠가 있는데.", src: "yj_4.jpg" },
            { name: "밤티인데여.", src: "yj_5.jpg" },
            { name: "누나 따듯하게 입고 다니라고 했잖아. 아 진짜 신경쓰이게.", src: "yj_6.jpg" },
            { name: "요즘은 관리하는 남자가 유행이라면서요 ㅎㅎ", src: "yj_7.jpg" },
            { name: "나한테 안길래? ㅋㅋ 아뭔데왤케작아 꼬맹이", src: "yj_8.jpg" },
            { name: "누나스트 나 편식 안해스트", src: "yj_9.jpg" }
        ];

        let winners = [];
        let cur = 0;
        let finalWinner = null;

        function openDoor() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('d-left').classList.add('open-left');
            document.getElementById('d-right').classList.add('open-right');
            document.getElementById('bgm').play(); // 음악 시작

            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                items.sort(() => Math.random() - 0.5);
                update();
            }, 1500);
        }

        function update() {
            if (items.length === 1) {
                showResult(items[0]);
                return;
            }

            if (cur >= items.length) {
                items = [...winners];
                winners = [];
                cur = 0;
                if (items.length > 1 && items.length % 2 !== 0) {
                    let bye = items.pop();
                    winners.push(bye);
                }
            }

            document.getElementById('round-title').innerText = items.length === 2 ? "FINAL" : items.length + "강";
            document.getElementById('match-info').innerText = (cur / 2 + 1) + " / " + Math.floor(items.length / 2);
            document.getElementById('img-l').src = items[cur].src;
            document.getElementById('name-l').innerText = items[cur].name;
            document.getElementById('img-r').src = items[cur + 1].src;
            document.getElementById('name-r').innerText = items[cur + 1].name;
        }

        function select(idx) {
            winners.push(items[cur + idx]);
            cur += 2;
            update();
        }

        function showResult(winner) {
            finalWinner = winner;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('winner-slot').innerHTML = `
                <div class="card" style="width:320px; cursor:default;">
                    <div class="img-box" style="height:400px;"><img src="${winner.src}"></div>
                    <div class="name-tag">${winner.name}</div>
                </div>
            `;
            
            // 빵빠레 (폭죽 효과)
            var duration = 5 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff7473', '#ffc952'] });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff7473', '#ffc952'] });
                if (Date.now() < end) { requestAnimationFrame(frame); }
            }());
        }

        function sendEmail() {
            const email = "yangsj051216@naver.com";
            const subject = encodeURIComponent("[이상형 월드컵] 양준이에게 인증샷 도착! 💖");
            const body = encodeURIComponent(`양준아! 내 이상형 월드컵 최종 우승자는 바로...\n\n🏆 "${finalWinner.name}" 🏆\n\n이거야! 사랑해 뿜뿜!`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
