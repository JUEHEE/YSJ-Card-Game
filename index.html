<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSJ ARCHIVE : PIXEL 24</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+KR:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1a1a1a;
            --text: #ffffff;
            --line: #333333;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg); color: var(--text);
            overflow: hidden;
            /* 도트 노이즈 질감 배경 */
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 4px 4px;
        }

        /* 인트로 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg);
        }

        .title-wrap {
            text-align: center; margin-bottom: 50px;
        }
        .title-wrap h2 {
            font-family: 'Montserrat'; font-size: 8vw; line-height: 0.8; margin: 0;
            letter-spacing: -2px; -webkit-text-stroke: 1px var(--text); color: transparent;
        }

        #start-btn {
            padding: 20px 60px; font-family: 'Montserrat'; font-weight: 900;
            font-size: 1.2rem; background: var(--text); color: var(--bg);
            border: none; cursor: pointer; transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); /* 도트/디지털 감성 컷팅 */
        }
        #start-btn:hover { background: #888; transform: scale(1.1); }

        /* 메인 게임 레이아웃 */
        #game-container {
            display: none; flex-direction: column; width: 100%; height: 100%;
        }

        .top-nav {
            padding: 20px 40px; border-bottom: 1px solid var(--line);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.8);
        }
        .top-nav h1 { font-family: 'Montserrat'; font-size: 1.5rem; margin: 0; letter-spacing: 2px; }

        .match-area {
            flex: 1; display: flex; gap: 20px; padding: 30px; align-items: center;
        }

        .card-container {
            flex: 1; height: 85%; display: flex; flex-direction: column;
            cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background: var(--card-bg); border: 1px solid var(--line);
        }
        .card-container:hover { transform: translateY(-10px); border-color: var(--text); }

        .image-box { flex: 1; overflow: hidden; position: relative; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.5s; }
        .card-container:hover img { filter: grayscale(0%); transform: scale(1.05); }

        /* 글자 보이는 영역 : 사진 아래에 확실히 배치 */
        .text-box {
            height: 100px; padding: 20px; display: flex; align-items: center; justify-content: center;
            background: var(--text); color: var(--bg); text-align: center;
            font-weight: 900; font-size: 1.4rem; word-break: keep-all;
        }

        .vs-label {
            font-family: 'Montserrat'; font-size: 3rem; font-style: italic; opacity: 0.3;
        }

        /* 결과 화면 */
        #result-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; text-align: center;
        }
        .win-title { font-family: 'Montserrat'; font-size: 4rem; color: var(--text); margin-bottom: 20px; }
        
        .btn-group { margin-top: 30px; display: flex; gap: 20px; }
        .btn-final {
            padding: 15px 40px; font-weight: 900; font-family: 'Noto Sans KR';
            border: 1px solid var(--text); cursor: pointer; transition: 0.3s;
        }
        .btn-black { background: var(--text); color: var(--bg); }
        .btn-white { background: transparent; color: var(--text); }
        .btn-final:hover { opacity: 0.7; }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="title-wrap">
            <h2>YSJ</h2>
            <h2 style="color: white;">IDEAL</h2>
            <h2>TYPE</h2>
        </div>
        <button id="start-btn" onclick="openDoor()">START</button>
    </div>

    <div id="game-container">
        <div class="top-nav">
            <h1 id="round-title">STAGE 16</h1>
            <div id="match-info" style="font-family: 'Montserrat'; opacity: 0.6;">01 / 08</div>
        </div>
        <div class="match-area">
            <div class="card-container" onclick="select(0)">
                <div class="image-box"><img id="img-l" src=""></div>
                <div class="text-box" id="name-l">-</div>
            </div>
            <div class="vs-label">VS</div>
            <div class="card-container" onclick="select(1)">
                <div class="image-box"><img id="img-r" src=""></div>
                <div class="text-box" id="name-r">-</div>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="win-title">THE WINNER</div>
        <div id="winner-slot"></div>
        <div class="btn-group">
            <button class="btn-final btn-black" onclick="sendEmail()">양준이에게 인증샷 보내기</button>
            <button class="btn-final btn-white" onclick="location.reload()">다시 하기</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        let items = [
            { name: "후궁, 누구를 들이시겠습니까", src: "yj_0.jpg" },
            { name: "오빠랑 잠깐 나가서 메로나 먹고 올래? ㅋㅋ", src: "yj_1.jpg" },
            { name: "누나 위해서 별 따주려고 나 지금 행성 가고 있어.", src: "yj_2.jpg" },
            { name: "발 되게 작다 ㅋㅋ; 나랑 발 크기 재볼래?", src: "yj_3.jpg" },
            { name: "아 잠만, 돈을 니가 왜 벌어 ㅋㅋ 오빠가 있는데.", src: "yj_4.jpg" },
            { name: "밤티인데여.", src: "yj_5.jpg" },
            { name: "누나 따듯하게 입고 다니라고 했잖아. 아 진짜 신경쓰이게.", src: "yj_6.jpg" },
            { name: "요즘은 관리하는 남자가 유행이라면서요 ㅎㅎ", src: "yj_7.jpg" },
            { name: "나한테 안길래? ㅋㅋ 아뭔데왤케작아 꼬맹이", src: "yj_8.jpg" },
            { name: "누나스트 나 편식 안해스트", src: "yj_9.jpg" }
        ];

        let winners = [];
        let cur = 0;
        let finalWinner = null;

        function openDoor() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('bgm').play().catch(e => {});
            items.sort(() => Math.random() - 0.5);
            update();
        }

        function update() {
            if (items.length === 1) {
                showResult(items[0]);
                return;
            }

            if (cur >= items.length) {
                items = [...winners];
                winners = [];
                cur = 0;
                if (items.length > 1 && items.length % 2 !== 0) {
                    winners.push(items.pop());
                }
            }

            document.getElementById('round-title').innerText = items.length === 2 ? "THE FINAL" : "STAGE " + items.length;
            document.getElementById('match-info').innerText = String(cur / 2 + 1).padStart(2, '0') + " / " + String(Math.floor(items.length / 2)).padStart(2, '0');
            document.getElementById('img-l').src = items[cur].src;
            document.getElementById('name-l').innerText = items[cur].name;
            document.getElementById('img-r').src = items[cur + 1].src;
            document.getElementById('name-r').innerText = items[cur + 1].name;
        }

        function select(idx) {
            winners.push(items[cur + idx]);
            cur += 2;
            update();
        }

        function showResult(winner) {
            finalWinner = winner;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('winner-slot').innerHTML = `
                <div class="card-container" style="width:350px; height:500px; flex:none; transform:none;">
                    <div class="image-box"><img src="${winner.src}" style="filter:none;"></div>
                    <div class="text-box">${winner.name}</div>
                </div>
            `;
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffffff', '#333333'] });
        }

        function sendEmail() {
            const email = "yangsj051216@naver.com";
            const subject = encodeURIComponent("[RESULT] YSJ WORLD CUP");
            const body = encodeURIComponent(`양준아, 축하해.\n\n🏆 우승: ${finalWinner.name}\n\n`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
