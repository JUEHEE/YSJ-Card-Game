<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSJ WORLD CUP : KITSCH EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@700&family=Noto+Sans+KR:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --window-bg: #ffffff;
            --window-border: #d1d1d1;
            --os-gray: #e4e4e4;
            --accent-blue: #4a90e2;
            --soft-pink: #ffb6c1;
            --kitsch-green: #90ee90;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #f0f0f0; /* 배경 회색 */
            font-family: 'Noto Sans KR', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* OS 윈도우 스타일 프레임 */
        .window-frame {
            width: 90vw; max-width: 600px; height: 80vh;
            background: var(--window-bg);
            border: 1px solid var(--window-border);
            border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
            position: relative; overflow: hidden;
        }

        /* 윈도우 상단 바 */
        .window-header {
            background: var(--os-gray);
            height: 40px; border-bottom: 1px solid var(--window-border);
            display: flex; align-items: center; padding: 0 15px;
            gap: 8px;
        }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }
        .address-bar {
            background: white; flex: 1; margin: 0 15px;
            height: 24px; border-radius: 4px; border: 1px solid #ccc;
            font-size: 12px; display: flex; align-items: center;
            padding-left: 10px; color: #666;
        }

        /* 인트로: 문이 열리는 효과 */
        #intro-screen {
            position: absolute; inset: 0; z-index: 100;
            display: flex; justify-content: center; align-items: center;
        }
        .door {
            position: absolute; width: 50%; height: 100%;
            background: var(--soft-pink);
            transition: transform 1.2s cubic-bezier(0.87, 0, 0.13, 1);
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
        }
        .door-left { left: 0; border-right: 1px solid rgba(0,0,0,0.1); }
        .door-right { right: 0; border-left: 1px solid rgba(0,0,0,0.1); }
        .door.open-left { transform: translateX(-100%); }
        .door.open-right { transform: translateX(100%); }
        
        .door-text { font-family: 'Gaegu'; font-size: 3rem; color: white; text-align: center; }

        #start-btn {
            position: absolute; z-index: 3;
            padding: 15px 40px; font-size: 1.5rem; font-family: 'Gaegu';
            background: var(--kitsch-green); border: 2px solid #000;
            border-radius: 50px; cursor: pointer; transition: 0.3s;
        }
        #start-btn:hover { transform: scale(1.1) rotate(-3deg); }

        /* 메인 게임 영역 */
        #main-content {
            flex: 1; display: flex; flex-direction: column;
            padding: 20px; overflow-y: auto; text-align: center;
        }

        .round-info { font-family: 'Gaegu'; font-size: 2rem; margin-bottom: 20px; color: var(--accent-blue); }

        .card-container {
            display: flex; gap: 15px; flex: 1; align-items: center;
        }
        .card {
            flex: 1; border: 1px solid #eee; border-radius: 12px;
            overflow: hidden; cursor: pointer; transition: 0.3s;
            background: #fafafa; position: relative;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-name { padding: 15px; font-size: 0.9rem; line-height: 1.4; color: #444; }

        .vs-label { font-family: 'Gaegu'; font-size: 2rem; color: #ff5f56; }

        /* 결과 화면 */
        #result-screen {
            display: none; flex-direction: column; align-items: center; gap: 20px;
        }
        .final-img { width: 200px; height: 200px; border-radius: 50%; border: 5px solid var(--soft-pink); object-fit: cover; }
        .final-btn {
            padding: 12px 30px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; font-family: 'Noto Sans KR';
        }
        .cert-btn { background: var(--soft-pink); color: white; margin-bottom: 10px; }

        #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div class="window-frame">
        <div class="window-header">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
            <div class="address-bar">www.yang-jun-world-cup.com</div>
        </div>

        <div id="intro-screen">
            <button id="start-btn" onclick="openDoor()">START !</button>
            <div class="door door-left" id="d-left"><div class="door-text">양준이</div></div>
            <div class="door door-right" id="d-right"><div class="door-text">월드컵</div></div>
        </div>

        <div id="main-content">
            <div id="game-view">
                <div class="round-info" id="round-title">ROUND 16</div>
                <div class="card-container">
                    <div class="card" onclick="select(0)">
                        <img id="img-l" src="">
                        <div class="card-name" id="name-l"></div>
                    </div>
                    <div class="vs-label">vs</div>
                    <div class="card" onclick="select(1)">
                        <img id="img-r" src="">
                        <div class="card-name" id="name-r"></div>
                    </div>
                </div>
            </div>

            <div id="result-screen">
                <h2 style="font-family: 'Gaegu'; font-size: 2.5rem; color: var(--soft-pink);">My Best Choice!</h2>
                <img id="final-img" class="final-img">
                <p id="final-name" style="font-weight: bold;"></p>
                <button class="final-btn cert-btn" onclick="sendEmail()">양준이에게 인증샷 보내기 💌</button>
                <button onclick="location.reload()" style="background:none; border:none; text-decoration:underline; cursor:pointer; color:#999;">다시하기</button>
            </div>
        </div>
    </div>

    <canvas id="confetti"></canvas>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        let items = [
            { name: "후궁, 누구를 들이시겠습니까", src: "yj_0.jpg" },
            { name: "오빠랑 잠깐 나가서 메로나 먹고 올래? ㅋㅋ", src: "yj_1.jpg" },
            { name: "누나 위해서 별 따주려고 나 지금 행성 가고 있어.", src: "yj_2.jpg" },
            { name: "발 되게 작다 ㅋㅋ; 나랑 발 크기 재볼래?", src: "yj_3.jpg" },
            { name: "아 잠만, 돈을 니가 왜 벌어 ㅋㅋ 오빠가 있는데.", src: "yj_4.jpg" },
            { name: "밤티인데여.", src: "yj_5.jpg" },
            { name: "누나 따듯하게 입고 다니라고 했잖아. 아 진짜 신경쓰이게.", src: "yj_6.jpg" },
            { name: "요즘은 관리하는 남자가 유행이라면서요 ㅎㅎ", src: "yj_7.jpg" },
            { name: "나한테 안길래? ㅋㅋ 아뭔데왤케작아 꼬맹이", src: "yj_8.jpg" },
            { name: "누나스트 나 편식 안해스트", src: "yj_9.jpg" }
        ];

        let winners = [];
        let cur = 0;
        let finalWinner = null;

        function openDoor() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('d-left').classList.add('open-left');
            document.getElementById('d-right').classList.add('open-right');
            document.getElementById('bgm').play().catch(e => {});

            setTimeout(() => {
                document.getElementById('intro-screen').style.pointerEvents = 'none';
                items.sort(() => Math.random() - 0.5);
                update();
            }, 1200);
        }

        function update() {
            if (items.length === 1) {
                showResult(items[0]);
                return;
            }

            if (cur >= items.length) {
                items = [...winners];
                winners = [];
                cur = 0;
            }

            document.getElementById('round-title').innerText = items.length === 2 ? "FINAL MATCH" : "ROUND " + items.length;
            document.getElementById('img-l').src = items[cur].src;
            document.getElementById('name-l').innerText = items[cur].name;
            document.getElementById('img-r').src = items[cur + 1].src;
            document.getElementById('name-r').innerText = items[cur + 1].name;
        }

        function select(idx) {
            winners.push(items[cur + idx]);
            cur += 2;
            update();
        }

        function showResult(winner) {
            finalWinner = winner;
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('final-img').src = winner.src;
            document.getElementById('final-name').innerText = winner.name;
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function sendEmail() {
            const email = "yangsj051216@naver.com";
            const subject = encodeURIComponent("[인증] 내가 뽑은 최고의 양준!");
            const body = encodeURIComponent(`양준아\n내가 뽑은 최고의 양준이는 바로...\n\n"${finalWinner.name}"\n\n이거이노라.`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
