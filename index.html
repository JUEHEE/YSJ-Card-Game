<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSJ ARCADE (24-BIT)</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111111;
            --main: #ffffff;
            --point: #00ff00; /* 레트로 네온 그린 포인트 */
            --accent: #333333;
            --pixel-size: 4px; /* 테두리 두께 */
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg); color: var(--main);
            overflow: hidden;
            /* 도트 패턴 배경 */
            background-image: linear-gradient(var(--accent) 1px, transparent 1px), linear-gradient(90svar(--accent) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* 인트로: 게임 타이틀 화면 스타일 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; justify-content: center; align-items: center;
            background: var(--bg);
        }

        .door {
            position: absolute; width: 50%; height: 100%;
            background: var(--bg); display: flex; align-items: center;
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1);
            /* 도트 테두리 */
            border: var(--pixel-size) solid var(--main);
        }
        .door-left { left: 0; justify-content: flex-end; border-right: none; }
        .door-right { right: 0; justify-content: flex-start; border-left: none; }

        .door.open-left { transform: translateX(-100%); }
        .door.open-right { transform: translateX(100%); }

        .door-text {
            font-family: 'Press Start 2P', cursive; font-size: 4vw; color: var(--main);
            line-height: 1.2; text-align: center; padding: 0 20px;
        }

        #start-btn {
            position: absolute; z-index: 110;
            padding: 15px 50px; font-family: 'Press Start 2P', cursive;
            font-size: 1rem; background: var(--point); color: black;
            border: var(--pixel-size) solid black; cursor: pointer; transition: 0.1s;
            box-shadow: 10px 10px 0px var(--main);
        }
        #start-btn:hover { transform: translate(5px, 5px); box-shadow: 5px 5px 0px var(--main); background: white; }

        /* 메인 게임 화면 */
        #game-container {
            display: none; flex-direction: column; width: 100%; height: 100%;
        }

        .nav-bar {
            padding: 20px 50px; display: flex; justify-content: space-between;
            align-items: center; border-bottom: var(--pixel-size) solid var(--main);
            background: rgba(0,0,0,0.5);
        }
        .nav-bar h1 { font-family: 'Press Start 2P', cursive; font-size: 1.5rem; margin: 0; color: var(--point); }
        .match-counter { font-family: 'Press Start 2P', cursive; font-size: 0.8rem; color: var(--main); }

        .match-box {
            display: flex; flex: 1; position: relative; padding: 20px; gap: 20px;
        }

        .card {
            flex: 1; position: relative; cursor: pointer;
            overflow: hidden; transition: 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            border: var(--pixel-size) solid var(--main);
            box-shadow: 10px 10px 0px var(--accent);
        }
        .card:hover { transform: scale(1.02); border-color: var(--point); }

        .card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: 0.5s; filter: grayscale(100%);
        }
        .card:hover img { filter: grayscale(0%); }

        .info-tag {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: white; padding: 15px 25px; border-top: var(--pixel-size) solid black;
            color: black; opacity: 0; transform: translateY(20px);
            transition: 0.3s;
        }
        .card:hover .info-tag { opacity: 1; transform: translateY(0); }
        .info-tag .name { font-weight: 900; font-size: 1.2rem; }

        /* 결과 화면 */
        #result-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; background: var(--bg);
            background-image: linear-gradient(var(--accent) 1px, transparent 1px), linear-gradient(90svar(--accent) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .winner-label { font-family: 'Press Start 2P', cursive; font-size: 3rem; color: var(--point); text-shadow: 5px 5px 0px var(--main); margin-bottom: 20px; }
        
        .action-group { margin-top: 40px; display: flex; gap: 15px; }
        .btn {
            padding: 15px 30px; font-family: 'Press Start 2P', cursive; font-size: 0.8rem; border: var(--pixel-size) solid black;
            cursor: pointer; transition: 0.1s; background: white; color: black;
            box-shadow: 8px 8px 0px var(--main);
        }
        .btn-main { background: var(--point); color: black; }
        .btn:hover { transform: translate(4px, 4px); box-shadow: 4px 4px 0px var(--main); }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button id="start-btn" onclick="openDoor()">PRESS START</button>
        <div class="door door-left" id="d-left"><div class="door-text">YSJ<br>ARC</div></div>
        <div class="door door-right" id="d-right"><div class="door-text">ADE<br>24B</div></div>
    </div>

    <div id="game-container">
        <div class="nav-bar">
            <h1 id="round-title">STAGE 16</h1>
            <div class="match-counter" id="match-info">01 / 08</div>
        </div>
        <div class="match-box">
            <div class="card" onclick="select(0)">
                <img id="img-l" src="">
                <div class="info-tag"><div class="name" id="name-l">-</div></div>
            </div>
            <div class="card" onclick="select(1)">
                <img id="img-r" src="">
                <div class="info-tag"><div class="name" id="name-r">-</div></div>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="winner-label">WINNER!</div>
        <div id="winner-slot"></div>
        <div class="action-group">
            <button class="btn btn-main" onclick="sendEmail()">SEND RESULT</button>
            <button class="btn" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // 데이터 유지
        let items = [
            { name: "후궁, 누구를 들이시겠습니까", src: "yj_0.jpg" },
            { name: "오빠랑 잠깐 나가서 메로나 먹고 올래? ㅋㅋ", src: "yj_1.jpg" },
            { name: "누나 위해서 별 따주려고 나 지금 행성 가고 있어.", src: "yj_2.jpg" },
            { name: "발 되게 작다 ㅋㅋ; 나랑 발 크기 재볼래?", src: "yj_3.jpg" },
            { name: "아 잠만, 돈을 니가 왜 벌어 ㅋㅋ 오빠가 있는데.", src: "yj_4.jpg" },
            { name: "밤티인데여.", src: "yj_5.jpg" },
            { name: "누나 따듯하게 입고 다니라고 했잖아. 아 진짜 신경쓰이게.", src: "yj_6.jpg" },
            { name: "요즘은 관리하는 남자가 유행이라면서요 ㅎㅎ", src: "yj_7.jpg" },
            { name: "나한테 안길래? ㅋㅋ 아뭔데왤케작아 꼬맹이", src: "yj_8.jpg" },
            { name: "누나스트 나 편식 안해스트", src: "yj_9.jpg" }
        ];

        let winners = [];
        let cur = 0;
        let finalWinner = null;

        function openDoor() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('d-left').classList.add('open-left');
            document.getElementById('d-right').classList.add('open-right');
            // 브라우저 정책으로 인해 자동 재생이 차단될 수 있음
            document.getElementById('bgm').play().catch(e => { console.log("Audio play blocked"); });

            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                items.sort(() => Math.random() - 0.5);
                update();
            }, 1200);
        }

        function update() {
            if (items.length === 1) {
                showResult(items[0]);
                return;
            }

            if (cur >= items.length) {
                items = [...winners];
                winners = [];
                cur = 0;
                if (items.length > 1 && items.length % 2 !== 0) {
                    winners.push(items.pop());
                }
            }

            document.getElementById('round-title').innerText = items.length === 2 ? "THE FINAL" : "STAGE " + items.length;
            document.getElementById('match-info').innerText = String(cur / 2 + 1).padStart(2, '0') + " / " + String(Math.floor(items.length / 2)).padStart(2, '0');
            document.getElementById('img-l').src = items[cur].src;
            document.getElementById('name-l').innerText = items[cur].name;
            document.getElementById('img-r').src = items[cur + 1].src;
            document.getElementById('name-r').innerText = items[cur + 1].name;
        }

        function select(idx) {
            winners.push(items[cur + idx]);
            cur += 2;
            update();
        }

        function showResult(winner) {
            finalWinner = winner;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('winner-slot').innerHTML = `
                <div class="card" style="width:350px; height:500px; flex:none; border-color:var(--point); border-width:8px;">
                    <img src="${winner.src}" style="filter:none;">
                    <div class="info-tag" style="opacity:1; transform:none; bottom:0;">
                        <div class="name" style="color:black;">${winner.name}</div>
                    </div>
                </div>
            `;
            
            // 고급스러운 폭죽 효과
            confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 }, colors: ['#00ff00', '#ffffff', '#111111'] });
        }

        function sendEmail() {
            const email = "yangsj051216@naver.com";
            const subject = encodeURIComponent("[YSJ ARCADE] NEW HIGHSCORE!");
            const body = encodeURIComponent(`양준아, 나의 아케이드 최종 우승자는...\n\n🏆 "${finalWinner.name}" 🏆\n\n이 결과에 이의는 받지 않는다. 사랑해!`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
