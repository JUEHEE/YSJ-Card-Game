<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSJ WORLD CUP : UNLIMITED</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007f;
            --deep-black: #0a0a0a;
            --acid-green: #ccff00;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--deep-black);
            color: white; overflow: hidden;
        }

        /* 인트로: 그래픽 디자인적인 문 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; justify-content: center; align-items: center;
        }

        .door {
            position: absolute; width: 50%; height: 100%;
            background: var(--neon-pink);
            display: flex; justify-content: center; align-items: center;
            transition: all 1.2s cubic-bezier(0.87, 0, 0.13, 1);
            border: 1px solid rgba(255,255,255,0.2);
            overflow: hidden;
        }
        .door-left { left: 0; border-right: 4px solid var(--deep-black); }
        .door-right { right: 0; border-left: 4px solid var(--deep-black); }

        /* 문이 열릴 때 옆으로 밀려남 */
        .door.open-left { transform: translateX(-100%); }
        .door.open-right { transform: translateX(100%); }

        .door-text {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 8vw; line-height: 0.9; color: var(--deep-black);
            text-transform: uppercase; user-select: none;
        }

        /* 스타트 버튼: 디자인적인 포인트 */
        #start-btn {
            position: absolute; z-index: 110;
            padding: 20px 60px; font-size: 2.5rem; font-family: 'Black Han Sans';
            background: var(--acid-green); border: none;
            color: var(--deep-black); cursor: pointer;
            transform: rotate(-5deg); transition: 0.2s;
            box-shadow: 8px 8px 0px var(--deep-black);
        }
        #start-btn:hover { transform: rotate(0deg) scale(1.1); box-shadow: 0px 0px 20px var(--acid-green); }

        /* 게임 컨테이너 */
        #game-container {
            display: none; flex-direction: column; align-items: center;
            width: 100%; height: 100%; 
            background: radial-gradient(circle, #222 0%, #000 100%);
        }

        .header { margin-top: 40px; text-align: center; z-index: 10; }
        .header h1 { 
            font-family: 'Black Han Sans'; font-size: 4rem; margin: 0;
            color: var(--neon-pink); -webkit-text-stroke: 1px white;
        }

        .match-box {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; width: 100%; flex: 1;
        }

        .card {
            position: relative; flex: 1; height: 70vh;
            cursor: pointer; overflow: hidden;
            transition: 0.5s; filter: grayscale(0.5);
        }
        .card:hover { filter: grayscale(0); flex: 1.5; }
        .card img { width: 100%; height: 100%; object-fit: cover; }

        .name-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%;
            padding: 40px 20px; background: linear-gradient(transparent, black);
            font-family: 'Black Han Sans'; font-size: 2rem; color: var(--acid-green);
        }

        .vs-badge {
            position: absolute; z-index: 5; font-family: 'Black Han Sans';
            font-size: 5rem; color: white; font-style: italic;
            text-shadow: 4px 4px var(--neon-pink); pointer-events: none;
        }

        /* 결과 화면 */
        #result-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; background: var(--deep-black);
        }
        .winner-title { font-family: 'Black Han Sans'; font-size: 3rem; color: var(--neon-pink); }
        
        .final-btn {
            padding: 15px 40px; font-size: 1.2rem; margin: 10px;
            font-family: 'Pretendard'; font-weight: 900; border: none; cursor: pointer;
        }
        .cert-btn { background: var(--acid-green); color: var(--deep-black); }
        .retry-btn { background: #333; color: white; }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button id="start-btn" onclick="openDoor()">ENTER</button>
        <div class="door door-left" id="d-left">
            <div class="door-text">YSJ<br>WORLD</div>
        </div>
        <div class="door door-right" id="d-right">
            <div class="door-text">CUP<br>2026</div>
        </div>
    </div>

    <div id="game-container">
        <div class="header">
            <h1 id="round-title">ROUND 16</h1>
            <p id="match-info" style="color: var(--acid-green);">1 / 8</p>
        </div>
        <div class="vs-badge">VS</div>
        <div class="match-box">
            <div class="card" onclick="select(0)">
                <img id="img-l" src="">
                <div class="name-overlay" id="name-l">CANDIDATE A</div>
            </div>
            <div class="card" onclick="select(1)">
                <img id="img-r" src="">
                <div class="name-overlay" id="name-r">CANDIDATE B</div>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="winner-title">THE FINAL WINNER</div>
        <div id="winner-slot" style="margin: 30px 0;"></div>
        <button class="final-btn cert-btn" onclick="sendEmail()">양준이에게 결과 전송</button>
        <button class="final-btn retry-btn" onclick="location.reload()">REPLAY</button>
    </div>

    <canvas id="confetti"></canvas>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // 데이터 부분은 동일하게 유지 (이미지 경로는 본인의 파일명에 맞게 확인해주세요)
        let items = [
            { name: "후궁, 누구를 들이시겠습니까", src: "yj_0.jpg" },
            { name: "오빠랑 잠깐 나가서 메로나 먹고 올래? ㅋㅋ", src: "yj_1.jpg" },
            { name: "누나 위해서 별 따주려고 나 지금 행성 가고 있어.", src: "yj_2.jpg" },
            { name: "발 되게 작다 ㅋㅋ; 나랑 발 크기 재볼래?", src: "yj_3.jpg" },
            { name: "아 잠만, 돈을 니가 왜 벌어 ㅋㅋ 오빠가 있는데.", src: "yj_4.jpg" },
            { name: "밤티인데여.", src: "yj_5.jpg" },
            { name: "누나 따듯하게 입고 다니라고 했잖아. 아 진짜 신경쓰이게.", src: "yj_6.jpg" },
            { name: "요즘은 관리하는 남자가 유행이라면서요 ㅎㅎ", src: "yj_7.jpg" },
            { name: "나한테 안길래? ㅋㅋ 아뭔데왤케작아 꼬맹이", src: "yj_8.jpg" },
            { name: "누나스트 나 편식 안해스트", src: "yj_9.jpg" }
        ];

        let winners = [];
        let cur = 0;
        let finalWinner = null;

        function openDoor() {
            document.getElementById('start-btn').style.opacity = '0';
            document.getElementById('d-left').classList.add('open-left');
            document.getElementById('d-right').classList.add('open-right');
            document.getElementById('bgm').play().catch(e => console.log("Audio play blocked"));

            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                items.sort(() => Math.random() - 0.5);
                update();
            }, 1200);
        }

        function update() {
            if (items.length === 1) {
                showResult(items[0]);
                return;
            }

            if (cur >= items.length) {
                items = [...winners];
                winners = [];
                cur = 0;
                if (items.length > 1 && items.length % 2 !== 0) {
                    winners.push(items.pop());
                }
            }

            document.getElementById('round-title').innerText = items.length === 2 ? "FINAL MATCH" : "ROUND " + items.length;
            document.getElementById('match-info').innerText = (cur / 2 + 1) + " / " + Math.floor(items.length / 2);
            document.getElementById('img-l').src = items[cur].src;
            document.getElementById('name-l').innerText = items[cur].name;
            document.getElementById('img-r').src = items[cur + 1].src;
            document.getElementById('name-r').innerText = items[cur + 1].name;
        }

        function select(idx) {
            winners.push(items[cur + idx]);
            cur += 2;
            update();
        }

        function showResult(winner) {
            finalWinner = winner;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('winner-slot').innerHTML = `
                <div class="card" style="width:350px; height:500px; filter:grayscale(0); border:5px solid var(--neon-pink);">
                    <img src="${winner.src}">
                    <div class="name-overlay" style="background:var(--neon-pink); color:black; text-align:center;">${winner.name}</div>
                </div>
            `;
            
            // 빵빠레 효과 (비비드한 컬러)
            const count = 200;
            const defaults = { origin: { y: 0.7 } };

            function fire(particleRatio, opts) {
                confetti({ ...defaults, ...opts, particleCount: Math.floor(count * particleRatio) });
            }

            fire(0.25, { spread: 26, startVelocity: 55 });
            fire(0.2, { spread: 60 });
            fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
            fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
            fire(0.1, { spread: 120, startVelocity: 45 });
        }

        function sendEmail() {
            const email = "yangsj051216@naver.com";
            const subject = encodeURIComponent(" [YSJ WORLD CUP] 최종 결과 리포트 ");
            const body = encodeURIComponent(`양준아, \n\n나의 원픽은 바로...\n--------------------------\n 우승: ${finalWinner.name}\n--------------------------\n`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
