<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSJ ARCHIVE : 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Pretendard:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #ffffff;
            --text-main: #ffffff;
            --text-sub: #111111;
            --line: #222222;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg); color: var(--text-main);
            overflow: hidden;
            /* 더 미세하고 세련된 도트 패턴 */
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* 인트로 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg);
        }

        .title-wrap { text-align: center; margin-bottom: 40px; }
        .title-wrap h2 {
            font-family: 'Montserrat'; font-size: 7vw; line-height: 1; margin: 0;
            letter-spacing: -1px; text-transform: uppercase;
        }

        #start-btn {
            padding: 20px 80px; font-family: 'Montserrat'; font-weight: 900;
            font-size: 1.5rem; background: var(--text-main); color: var(--bg);
            border: none; cursor: pointer; transition: all 0.3s;
            letter-spacing: 2px;
        }
        #start-btn:hover { background: #cccccc; letter-spacing: 8px; }

        /* 메인 게임 영역 */
        #game-container {
            display: none; flex-direction: column; width: 100%; height: 100%;
        }

        .header-nav {
            padding: 30px 50px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--line);
        }
        .header-nav h1 { font-family: 'Montserrat'; font-size: 1.8rem; margin: 0; letter-spacing: 1px; }

        .match-area {
            flex: 1; display: flex; gap: 40px; padding: 40px; align-items: center; justify-content: center;
        }

        .card-container {
            flex: 1; max-width: 450px; height: 80%; display: flex; flex-direction: column;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid var(--line); background: var(--card-bg);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        /* 마우스 오버 시 연출: 선택된 카드는 강조, 배경은 살짝 어둡게 */
        .match-area:hover .card-container:not(:hover) {
            opacity: 0.4; transform: scale(0.95); filter: grayscale(1);
        }

        .image-box { flex: 1; overflow: hidden; background: #eee; }
        .image-box img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s ease;
        }
        .card-container:hover img { transform: scale(1.08); }

        /* 글자 박스: 자간 및 가독성 최적화 */
        .text-box {
            padding: 25px 20px; background: #ffffff; color: #000000;
            text-align: center; border-top: 1px solid #ddd;
        }
        .text-box .name {
            font-weight: 800; font-size: 1.3rem; line-height: 1.4;
            letter-spacing: -0.5px; word-break: keep-all;
        }

        .vs-circle {
            font-family: 'Montserrat'; font-size: 2rem; font-weight: 900;
            color: var(--line); border: 2px solid var(--line);
            width: 80px; height: 80px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; flex-shrink: 0;
        }

        /* 결과 화면 */
        #result-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%;
        }
        .winner-tag { font-family: 'Montserrat'; font-size: 5rem; margin-bottom: 20px; }
        
        .btn-group { margin-top: 40px; display: flex; gap: 20px; }
        .btn {
            padding: 18px 45px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.3s; border: 1px solid white;
        }
        .btn-fill { background: white; color: black; }
        .btn-outline { background: transparent; color: white; }
        .btn:hover { opacity: 0.6; }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="title-wrap">
            <h2>YANG JUN</h2>
            <h2 style="opacity: 0.3;">WORLD CUP</h2>
        </div>
        <button id="start-btn" onclick="openDoor()">ENTER</button>
    </div>

    <div id="game-container">
        <div class="header-nav">
            <h1 id="round-title">ROUND 16</h1>
            <div id="match-info" style="font-family: 'Montserrat'; font-weight: 900;">01 / 08</div>
        </div>
        <div class="match-area">
            <div class="card-container" onclick="select(0)">
                <div class="image-box"><img id="img-l" src=""></div>
                <div class="text-box"><div class="name" id="name-l">-</div></div>
            </div>
            <div class="vs-circle">VS</div>
            <div class="card-container" onclick="select(1)">
                <div class="image-box"><img id="img-r" src=""></div>
                <div class="text-box"><div class="name" id="name-r">-</div></div>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="winner-tag">WINNER</div>
        <div id="winner-slot"></div>
        <div class="btn-group">
            <button class="btn btn-fill" onclick="sendEmail()">SEND TO YANGJUN</button>
            <button class="btn btn-outline" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        let items = [
            { name: "후궁, 누구를 들이시겠습니까", src: "yj_0.jpg" },
            { name: "오빠랑 잠깐 나가서 메로나 먹고 올래? ㅋㅋ", src: "yj_1.jpg" },
            { name: "누나 위해서 별 따주려고 나 지금 행성 가고 있어.", src: "yj_2.jpg" },
            { name: "발 되게 작다 ㅋㅋ; 나랑 발 크기 재볼래?", src: "yj_3.jpg" },
            { name: "아 잠만, 돈을 니가 왜 벌어 ㅋㅋ 오빠가 있는데.", src: "yj_4.jpg" },
            { name: "밤티인데여.", src: "yj_5.jpg" },
            { name: "누나 따듯하게 입고 다니라고 했잖아. 아 진짜 신경쓰이게.", src: "yj_6.jpg" },
            { name: "요즘은 관리하는 남자가 유행이라면서요 ㅎㅎ", src: "yj_7.jpg" },
            { name: "나한테 안길래? ㅋㅋ 아뭔데왤케작아 꼬맹이", src: "yj_8.jpg" },
            { name: "누나스트 나 편식 안해스트", src: "yj_9.jpg" }
        ];

        let winners = [];
        let cur = 0;
        let finalWinner = null;

        function openDoor() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('bgm').play().catch(e => {});
            items.sort(() => Math.random() - 0.5);
            update();
        }

        function update() {
            if (items.length === 1) {
                showResult(items[0]);
                return;
            }

            if (cur >= items.length) {
                items = [...winners];
                winners = [];
                cur = 0;
                if (items.length > 1 && items.length % 2 !== 0) {
                    winners.push(items.pop());
                }
            }

            document.getElementById('round-title').innerText = items.length === 2 ? "FINAL MATCH" : "ROUND " + items.length;
            document.getElementById('match-info').innerText = String(cur / 2 + 1).padStart(2, '0') + " / " + String(Math.floor(items.length / 2)).padStart(2, '0');
            document.getElementById('img-l').src = items[cur].src;
            document.getElementById('name-l').innerText = items[cur].name;
            document.getElementById('img-r').src = items[cur + 1].src;
            document.getElementById('name-r').innerText = items[cur + 1].name;
        }

        function select(idx) {
            winners.push(items[cur + idx]);
            cur += 2;
            update();
        }

        function showResult(winner) {
            finalWinner = winner;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('winner-slot').innerHTML = `
                <div class="card-container" style="width:380px; height:520px; flex:none; transform:none; opacity:1 !important; filter:none !important;">
                    <div class="image-box"><img src="${winner.src}"></div>
                    <div class="text-box"><div class="name">${winner.name}</div></div>
                </div>
            `;
            
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffffff', '#888888', '#222222'] });
        }

        function sendEmail() {
            const email = "yangsj051216@naver.com";
            const subject = encodeURIComponent("[WINNER] YSJ WORLD CUP RESULT");
            const body = encodeURIComponent(`양준아! 이번 월드컵 최종 우승자는...\n\n🏆 "${finalWinner.name}"\n\n축하해! 곧 인증샷 보내줄게! 💖`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
