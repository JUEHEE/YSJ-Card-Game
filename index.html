<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSJ ARCHIVE (24)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+KR:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f4f4;
            --main: #111111;
            --point: #ff3e3e; /* 강렬한 레드 포인트 */
            --accent: #ffffff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg); color: var(--main);
            overflow: hidden;
        }

        /* 인트로: 매거진 커버 스타일 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; justify-content: center; align-items: center;
            background: var(--main);
        }

        .door {
            position: absolute; width: 50%; height: 100%;
            background: var(--main); display: flex; align-items: center;
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .door-left { left: 0; justify-content: flex-end; border-right: 1px solid #333; }
        .door-right { right: 0; justify-content: flex-start; }

        .door.open-left { transform: translateX(-100%); }
        .door.open-right { transform: translateX(100%); }

        .door-text {
            font-family: 'Montserrat'; font-size: 12vw; color: var(--accent);
            letter-spacing: -5px; line-height: 0.8; opacity: 0.9;
        }

        #start-btn {
            position: absolute; z-index: 110;
            padding: 15px 50px; font-family: 'Montserrat'; font-weight: 900;
            font-size: 1.5rem; background: var(--point); color: white;
            border: none; cursor: pointer; transition: 0.3s;
        }
        #start-btn:hover { letter-spacing: 5px; background: white; color: var(--main); }

        /* 메인 게임 화면 */
        #game-container {
            display: none; flex-direction: column; width: 100%; height: 100%;
        }

        .nav-bar {
            padding: 30px 50px; display: flex; justify-content: space-between;
            align-items: baseline; border-bottom: 2px solid var(--main);
        }
        .nav-bar h1 { font-family: 'Montserrat'; font-size: 2rem; margin: 0; }
        .match-counter { font-family: 'Montserrat'; font-size: 1.2rem; font-weight: 900; }

        .match-box {
            display: flex; flex: 1; position: relative;
        }

        .card {
            flex: 1; position: relative; cursor: pointer;
            overflow: hidden; transition: flex 0.6s cubic-bezier(0.2, 1, 0.3, 1);
            border-right: 1px solid var(--main);
        }
        .card:last-child { border-right: none; }
        .card:hover { flex: 1.4; }

        .card img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.8s; filter: grayscale(100%);
        }
        .card:hover img { transform: scale(1.05); filter: grayscale(0%); }

        .info-tag {
            position: absolute; bottom: 40px; left: 40px; right: 40px;
            background: white; padding: 25px; border: 3px solid var(--main);
            box-shadow: 10px 10px 0px var(--main); opacity: 0; transform: translateY(20px);
            transition: 0.4s;
        }
        .card:hover .info-tag { opacity: 1; transform: translateY(0); }
        .info-tag .name { font-weight: 900; font-size: 1.5rem; }

        /* 결과 화면 */
        #result-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; background: var(--bg);
        }
        .winner-label { font-family: 'Montserrat'; font-size: 5rem; margin-bottom: -30px; z-index: 1; }
        
        .action-group { margin-top: 40px; display: flex; gap: 15px; }
        .btn {
            padding: 15px 30px; font-weight: 700; border: 3px solid var(--main);
            cursor: pointer; transition: 0.2s; background: white;
        }
        .btn-main { background: var(--main); color: white; }
        .btn:hover { transform: translate(-4px, -4px); box-shadow: 6px 6px 0px var(--main); }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <button id="start-btn" onclick="openDoor()">START REVELATION</button>
        <div class="door door-left" id="d-left"><div class="door-text">YSJ<br>ARC</div></div>
        <div class="door door-right" id="d-right"><div class="door-text">HIV<br>E24</div></div>
    </div>

    <div id="game-container">
        <div class="nav-bar">
            <h1 id="round-title">STAGE 16</h1>
            <div class="match-counter" id="match-info">01 / 08</div>
        </div>
        <div class="match-box">
            <div class="card" onclick="select(0)">
                <img id="img-l" src="">
                <div class="info-tag"><div class="name" id="name-l">-</div></div>
            </div>
            <div class="card" onclick="select(1)">
                <img id="img-r" src="">
                <div class="info-tag"><div class="name" id="name-r">-</div></div>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="winner-label">WINNER</div>
        <div id="winner-slot"></div>
        <div class="action-group">
            <button class="btn btn-main" onclick="sendEmail()">SEND TO YANGJUN</button>
            <button class="btn" onclick="location.reload()">RE-ARCHIVE</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // 데이터 유지
        let items = [
            { name: "후궁, 누구를 들이시겠습니까", src: "yj_0.jpg" },
            { name: "오빠랑 잠깐 나가서 메로나 먹고 올래? ㅋㅋ", src: "yj_1.jpg" },
            { name: "누나 위해서 별 따주려고 나 지금 행성 가고 있어.", src: "yj_2.jpg" },
            { name: "발 되게 작다 ㅋㅋ; 나랑 발 크기 재볼래?", src: "yj_3.jpg" },
            { name: "아 잠만, 돈을 니가 왜 벌어 ㅋㅋ 오빠가 있는데.", src: "yj_4.jpg" },
            { name: "밤티인데여.", src: "yj_5.jpg" },
            { name: "누나 따듯하게 입고 다니라고 했잖아. 아 진짜 신경쓰이게.", src: "yj_6.jpg" },
            { name: "요즘은 관리하는 남자가 유행이라면서요 ㅎㅎ", src: "yj_7.jpg" },
            { name: "나한테 안길래? ㅋㅋ 아뭔데왤케작아 꼬맹이", src: "yj_8.jpg" },
            { name: "누나스트 나 편식 안해스트", src: "yj_9.jpg" }
        ];

        let winners = [];
        let cur = 0;
        let finalWinner = null;

        function openDoor() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('d-left').classList.add('open-left');
            document.getElementById('d-right').classList.add('open-right');
            document.getElementById('bgm').play().catch(e => {});

            setTimeout(() => {
                document.getElementById('intro-screen').style.display = 'none';
                document.getElementById('game-container').style.display = 'flex';
                items.sort(() => Math.random() - 0.5);
                update();
            }, 1200);
        }

        function update() {
            if (items.length === 1) {
                showResult(items[0]);
                return;
            }

            if (cur >= items.length) {
                items = [...winners];
                winners = [];
                cur = 0;
                if (items.length > 1 && items.length % 2 !== 0) {
                    winners.push(items.pop());
                }
            }

            document.getElementById('round-title').innerText = items.length === 2 ? "THE FINAL" : "STAGE " + items.length;
            document.getElementById('match-info').innerText = String(cur / 2 + 1).padStart(2, '0') + " / " + String(Math.floor(items.length / 2)).padStart(2, '0');
            document.getElementById('img-l').src = items[cur].src;
            document.getElementById('name-l').innerText = items[cur].name;
            document.getElementById('img-r').src = items[cur + 1].src;
            document.getElementById('name-r').innerText = items[cur + 1].name;
        }

        function select(idx) {
            winners.push(items[cur + idx]);
            cur += 2;
            update();
        }

        function showResult(winner) {
            finalWinner = winner;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('winner-slot').innerHTML = `
                <div class="card" style="width:400px; height:550px; flex:none; border:4px solid var(--main);">
                    <img src="${winner.src}" style="filter:none;">
                    <div class="info-tag" style="opacity:1; transform:none; bottom:20px;">
                        <div class="name">${winner.name}</div>
                    </div>
                </div>
            `;
            
            // 깔끔하고 고급스러운 폭죽 효과
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#111', '#ff3e3e', '#ffffff'] });
        }

        function sendEmail() {
            const email = "yangsj051216@naver.com";
            const subject = encodeURIComponent("[CONFIRMED] YSJ WORLD CUP WINNER");
            const body = encodeURIComponent(`양준아, 이 결과는 운명이자 확정이야.\n\n나의 아카이브 최종 우승자:\n🏆 ${finalWinner.name}\n\n`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
