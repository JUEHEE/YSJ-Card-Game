<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YSJ IDEAL TYPE WORLD CUP</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Pretendard:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; /* 블랙 배경 */
            --card-bg: #ffffff;
            --text-main: #ffffff;
            --text-sub: #111111;
            --line: #222222;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg); color: var(--text-main);
            overflow: hidden;
            /* 은은한 격자 도트 패턴 배경 */
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 15px 15px;
        }

        /* 인트로 */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg);
        }

        .title-wrap { text-align: center; margin-bottom: 40px; }
        .title-wrap h2 {
            font-family: 'Montserrat'; font-size: 7vw; line-height: 1; margin: 0;
            letter-spacing: -1px; text-transform: uppercase;
        }

        #start-btn {
            padding: 20px 80px; font-family: 'Montserrat'; font-weight: 900;
            font-size: 1.5rem; background: var(--text-main); color: var(--bg);
            border: none; cursor: pointer; transition: all 0.3s;
        }

        /* 메인 게임 영역 */
        #game-container {
            display: none; flex-direction: column; width: 100%; height: 100%;
        }

        .header-nav {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--line); background: rgba(0,0,0,0.8);
        }
        .header-nav h1 { font-family: 'Montserrat'; font-size: 1.5rem; margin: 0; }
        .match-counter { font-family: 'Montserrat'; font-size: 0.9rem; font-weight: 900; }

        .match-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        /* 카드 컨테이너: 마우스 오버 시 연출을 위한 가상 요소 활용 */
        .card-container {
            flex: 1; display: flex; flex-direction: column;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            background: var(--card-bg); overflow: hidden;
            filter: grayscale(1); /* 기본 흑백 */
            position: relative;
        }
        .card-container:hover { filter: grayscale(0); transform: scale(1.03); z-index: 5; }

        /* VS 배지: 카드 위에 배치하여 카드 간격을 좁힘 */
        .vs-badge {
            position: absolute; z-index: 10;
            font-family: 'Montserrat'; font-size: 1.5rem; font-weight: 900;
            color: black; background: white;
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            pointer-events: none; border: 3px solid black; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .image-box { flex: 1; overflow: hidden; background: #eee; position: relative; }
        .image-box img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 0.6s ease;
        }
        
        /* 선택 연출: 한쪽 카드에 마우스를 올리면 다른 쪽 카드가 살짝 어두워짐 */
        .match-area:hover .card-container:not(:hover) {
            opacity: 0.5; filter: grayscale(1) !important;
        }

        /* 글자 박스: 자간 및 가독성 최적화 */
        .text-box {
            padding: 15px 10px; background: #ffffff; color: #000000;
            text-align: center; border-top: 1px solid #ddd;
            height: 80px; display: flex; align-items: center; justify-content: center;
        }
        .text-box .name {
            font-weight: 800; font-size: 1.1rem; line-height: 1.4;
            letter-spacing: -0.5px; word-break: keep-all;
        }

        /* 모바일용 미디어 쿼리: 스크린샷처럼 휴대폰에서 볼 때 카드 간격 좁힘 */
        @media screen and (max-width: 768px) {
            .match-area { gap: 5px; padding: 10px; } /* 카드 사이 간격 최소화 */
            .card-container { height: 70vh; } /* 카드를 세로로 더 길게 */
            .text-box { height: 100px; padding: 20px 10px; }
            .text-box .name { font-size: 1.2rem; }
            .vs-badge { font-size: 1.2rem; width: 40px; height: 40px; }
        }

        /* 결과 화면 */
        #result-screen {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 100%; padding: 20px;
        }
        .winner-tag { font-family: 'Montserrat'; font-size: 4rem; margin-bottom: 20px; color: white; }
        
        .btn-group { margin-top: 30px; display: flex; gap: 10px; width: 100%; max-width: 400px; }
        .btn {
            flex: 1; padding: 18px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.3s; border: none; font-family: 'Pretendard';
        }
        .btn-fill { background: white; color: black; }
        .btn-outline { background: #333; color: white; border: 1px solid white; }
        .btn:hover { opacity: 0.6; }

        #confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="title-wrap">
            <h2>YANG JUN</h2>
            <h2 style="opacity: 0.3;">WORLD CUP</h2>
        </div>
        <button id="start-btn" onclick="openDoor()">ENTER</button>
    </div>

    <div id="game-container">
        <div class="header-nav">
            <h1 id="round-title">ROUND 16</h1>
            <div class="match-counter" id="match-info">01 / 08</div>
        </div>
        <div class="match-area">
            <div class="card-container" onclick="select(0)">
                <div class="image-box"><img id="img-l" src=""></div>
                <div class="text-box"><div class="name" id="name-l">-</div></div>
            </div>
            <div class="vs-badge">VS</div>
            <div class="card-container" onclick="select(1)">
                <div class="image-box"><img id="img-r" src=""></div>
                <div class="text-box"><div class="name" id="name-r">-</div></div>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="winner-tag">THE FINAL</div>
        <div id="winner-slot"></div>
        <div class="btn-group">
            <button class="btn btn-fill" onclick="sendEmail()">양준이에게 인증샷</button>
            <button class="btn btn-outline" onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <canvas id="confetti"></canvas>
    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // 데이터 유지
        let items = [
            { name: "후궁, 누구를 들이시겠습니까", src: "yj_0.jpg" },
            { name: "오빠랑 잠깐 나가서 메로나 먹고 올래? ㅋㅋ", src: "yj_1.jpg" },
            { name: "누나 위해서 별 따주려고 나 지금 행성 가고 있어.", src: "yj_2.jpg" },
            { name: "발 되게 작다 ㅋㅋ; 나랑 발 크기 재볼래?", src: "yj_3.jpg" },
            { name: "아 잠만, 돈을 니가 왜 벌어 ㅋㅋ 오빠가 있는데.", src: "yj_4.jpg" },
            { name: "밤티인데여.", src: "yj_5.jpg" },
            { name: "누나 따듯하게 입고 다니라고 했잖아. 아 진짜 신경쓰이게.", src: "yj_6.jpg" },
            { name: "요즘은 관리하는 남자가 유행이라면서요 ㅎㅎ", src: "yj_7.jpg" },
            { name: "나한테 안길래? ㅋㅋ 아뭔데왤케작아 꼬맹이", src: "yj_8.jpg" },
            { name: "누나스트 나 편식 안해스트", src: "yj_9.jpg" }
        ];

        let winners = [];
        let cur = 0;
        let finalWinner = null;

        function openDoor() {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('bgm').play().catch(e => { console.log("Audio play blocked"); });
            items.sort(() => Math.random() - 0.5);
            update();
        }

        function update() {
            if (items.length === 1) {
                showResult(items[0]);
                return;
            }

            if (cur >= items.length) {
                items = [...winners];
                winners = [];
                cur = 0;
                if (items.length > 1 && items.length % 2 !== 0) {
                    winners.push(items.pop());
                }
            }

            document.getElementById('round-title').innerText = items.length === 2 ? "THE FINAL" : "ROUND " + items.length;
            document.getElementById('match-info').innerText = String(cur / 2 + 1).padStart(2, '0') + " / " + String(Math.floor(items.length / 2)).padStart(2, '0');
            document.getElementById('img-l').src = items[cur].src;
            document.getElementById('name-l').innerText = items[cur].name;
            document.getElementById('img-r').src = items[cur + 1].src;
            document.getElementById('name-r').innerText = items[cur + 1].name;
        }

        function select(idx) {
            winners.push(items[cur + idx]);
            cur += 2;
            update();
        }

        function showResult(winner) {
            finalWinner = winner;
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('result-screen').style.display = 'flex';
            document.getElementById('winner-slot').innerHTML = `
                <div class="card-container" style="width:300px; height:450px; flex:none; filter:grayscale(0); z-index:10;">
                    <div class="image-box"><img src="${winner.src}"></div>
                    <div class="text-box"><div class="name">${winner.name}</div></div>
                </div>
            `;
            
            // 폭죽 효과 (화이트/블랙/그레이로 세련되게)
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffffff', '#222222', '#888888'] });
        }

        function sendEmail() {
            const email = "yangsj051216@naver.com";
            const subject = encodeURIComponent("[WINNER] YSJ WORLD CUP RESULT");
            const body = encodeURIComponent(`양준님 이번 월드컵 최종 우승자는...\n\n🏆 "${finalWinner.name}"\n\n입니다.`);
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>
</body>
</html>
